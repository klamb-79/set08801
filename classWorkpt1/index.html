<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Memory Match Level 1</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="game-header">
        <h1>Zen Memory</h1>
        <div class="stats-container">
            <p>Moves: <span id="moves" aria-live="polite">0</span></p>
            <button type="button" id="reset-btn" class="reset-btn" aria-label="Restart the game">Reset Game</button>
            <h1>Level 1 - Animals of Belize</h1>
        </div>
    </header>

    <main>
        <section id="game-board" class="memory-game" aria-label="Memory Card Grid">

            <div class="game-card">
                <img src="./images/butterfly.jpg" alt="" class="card-flip">
            </div>
            <div class="game-card card-back"></div>
            <div class="game-card card-back"></div>
            <div class="game-card card-back"></div>
            <div class="game-card">
                <img src="./images/jag.jpg" alt="" class="card-flip" name="jag">
            </div>
            <div class="game-card card-back"></div>
            <div class="game-card card-back"></div>
            <div class="game-card card-back"></div>
            <div class="game-card">
                <img src="./images/jag.jpg" alt="" class="card-flip">
            </div>
            <div class="game-card card-back"></div>
            <div class="game-card card-back"></div>
            <div class="game-card">
                <img src="./images/baboon.jpg" alt="" class="card-flip">
            </div>
            <div class="game-card card-back"></div>
            <div class="game-card">
                <img src="./images/butterfly.jpg" alt="" class="card-flip">
            </div>
            <div class="game-card">
                <img src="./images/owl.jpg" alt="Owl" class="card-flip">
            </div>
            <div class="game-card">
                <img src="./images/snake.jpg" alt="" class="card-flip">
            </div>
            <div class="game-card card-back"></div>
            <div class="game-card card-back"></div>
            <div class="game-card card-back">
                <img src="./images/baboon.jpg" alt="" class="card-flip">
            </div>
            <div class="game-card card-back"></div>




        </section>
    </main>

    <footer class="game-footer">
        <button onclick="location.href ='level2.html'" id="next-level-btn" class="reset-btn">
             Next Level</button>
        <p>Find your focus. Match the pairs.</p>
    </footer>

    <!--<script src="script.js"></script>-->
</body>

</html>
