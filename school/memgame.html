<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>Dragon Ball Memory Rush | With Sound Effects</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #1a1c3b, #0b0d1a);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 20, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      color: #ffd966;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 200, 50, 0.2);
      border-top: 4px solid #ffaa00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255,215,0,0.08) 1px, transparent 1px),
        radial-gradient(circle at 80% 70%, rgba(255,140,0,0.1) 2px, transparent 2px),
        radial-gradient(circle at 40% 80%, rgba(255,200,0,0.06) 1px, transparent 1px),
        radial-gradient(circle at 90% 15%, rgba(255,180,50,0.12) 2px, transparent 2px);
      background-size: 280px 280px, 350px 350px, 400px 400px, 300px 300px;
      pointer-events: none;
      z-index: 0;
    }

    .game-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(2px);
      display: none;
    }

    .game-wrapper.ready {
      display: flex;
    }

    h1 {
      font-size: clamp(2.2rem, 8vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ffd966 20%, #f0a500 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px #ff8800aa);
      margin-bottom: 0.3rem;
      text-align: center;
    }

    .subtitle {
      color: #e6b422;
      font-weight: 500;
      letter-spacing: 0.2rem;
      font-size: 1rem;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(10, 10, 30, 0.55);
      padding: 0.4rem 2rem;
      border-radius: 40px;
      backdrop-filter: blur(10px);
    }

    .sound-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #ffaa33;
      color: #ffcc77;
      font-size: 1.5rem;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sound-toggle:hover {
      background: #ff8800;
      color: #0a0a1a;
      transform: scale(1.1);
    }

    .sound-toggle.muted {
      opacity: 0.5;
      border-color: #666;
      color: #666;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 1.5rem;
      color: #ffd966;
      font-weight: 600;
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.8rem 1.8rem;
      border-radius: 3rem;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 200, 50, 0.3);
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(42, 30, 92, 0.6);
      padding: 0.4rem 1.2rem;
      border-radius: 30px;
      color: #feda6a;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: #ffaa00;
      min-width: 2rem;
      text-align: center;
    }

    .reset-btn {
      background: none;
      border: 1px solid #ffaa33;
      color: #ffcc77;
      font-weight: bold;
      font-size: 1rem;
      padding: 0.5rem 1.4rem;
      border-radius: 2rem;
      cursor: pointer;
      background: rgba(255,140,0,0.15);
      backdrop-filter: blur(8px);
      transition: all 0.25s;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .reset-btn:hover {
      background: #ff8800;
      color: #0a0a1a;
      border-color: #ffffff;
      box-shadow: 0 0 20px #ffaa00;
      transform: scale(1.05);
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 850px;
      margin: 0 auto;
      justify-content: center;
    }

    .card {
      aspect-ratio: 1 / 1;
      background: transparent;
      border-radius: 16px;
      cursor: pointer;
      perspective: 800px;
      transition: transform 0.15s ease;
      user-select: none;
    }

    .card.matched {
      cursor: default;
    }

    .card.matched:active {
      transform: none;
    }

    .card:active {
      transform: scale(0.96);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,200,70,0.3);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card.matched .card-inner {
      transform: rotateY(180deg) !important;
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-back {
      background: #0f1329;
      background-image: radial-gradient(circle at 30% 30%, #2d335c, #090c1f);
      border: 2px solid #f0a500;
      transform: rotateY(0deg);
    }

    .card-back::before {
      content: "CC";
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 900;
      color: #faa51a;
      text-shadow: 0 0 15px #ff7b00;
      letter-spacing: 0.1em;
      background: rgba(0,0,0,0.4);
      width: 75%;
      height: 75%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 2px solid #ffbb33;
      background: radial-gradient(circle at 30% 30%, #1d2440, #04061a);
      box-shadow: 0 0 25px #ff8800cc;
    }

    .card-front {
      background: radial-gradient(circle at 20% 25%, #ffd58c, #db6b00);
      transform: rotateY(180deg);
      border: 2px solid #ffe484;
      box-shadow: inset 0 0 30px #ffbb2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.4rem;
      overflow: hidden;
    }

    .card.matched .card-inner {
      box-shadow: 0 0 30px #fbbf24, 0 0 8px #ffffff;
      filter: brightness(1.2);
      animation: matchGlow 0.6s ease-out;
    }

    .card.matched .card-front {
      background: radial-gradient(circle at 30% 25%, #ffea9f, #b45f00);
      border: 2px solid gold;
    }

    @keyframes matchGlow {
      0% { 
        box-shadow: 0 0 50px #ffd700, 0 0 100px #ff8c00; 
        filter: brightness(1.5);
      }
      100% { 
        box-shadow: 0 0 30px #fbbf24, 0 0 8px #ffffff; 
        filter: brightness(1.2);
      }
    }

    .character-image {
      width: 80%;
      height: 70%;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
    }

    .character-name-tag {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      background: rgba(0,0,0,0.75);
      color: #ffecaa;
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      margin-top: 4px;
      letter-spacing: 0.05em;
      white-space: nowrap;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .win-message {
      margin-top: 2rem;
      font-size: 1.8rem;
      font-weight: 800;
      color: #ffd966;
      text-shadow: 0 0 25px #ff8800;
      background: rgba(0,0,0,0.7);
      padding: 0.7rem 2.5rem;
      border-radius: 40px;
      letter-spacing: 0.1em;
      display: none;
      align-items: center;
      gap: 0.6rem;
      text-align: center;
    }

    .win-message.visible {
      display: flex;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .error-message {
      color: #ff6b6b;
      background: rgba(0,0,0,0.7);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      margin-bottom: 1rem;
      display: none;
    }

    .best-score {
      font-size: 0.8rem;
      color: #aaa;
      margin-left: 0.3rem;
    }

    @media (max-width: 650px) {
      .game-board {
        gap: 6px;
      }
      .character-name-tag {
        font-size: 0.45rem;
        padding: 0.1rem 0.3rem;
      }
      .stats {
        font-size: 0.9rem;
        padding: 0.6rem 1rem;
      }
    }

    @media (max-width: 480px) {
      .game-board {
        grid-template-columns: repeat(6, 1fr);
        gap: 5px;
      }
      .stats {
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <p style="font-size: 1.2rem; font-weight: bold;">Summoning Characters...</p>
  <p style="font-size: 0.8rem; color: #aaa; margin-top: 0.5rem;">Fetching from Dragon Ball API</p>
</div>

<button class="sound-toggle" id="soundToggle" title="Toggle Sound">🔊</button>

<div class="game-wrapper" id="gameWrapper">
  <h1>⚡MEMORY RUSH⚡</h1>
  <div class="subtitle">
    <span>🐉 ドラゴンボール</span>
    <span>24 PAIRS</span>
  </div>

  <div class="error-message" id="errorMessage"></div>

  <div class="stats">
    <div class="stat-item">
      <span>🎯 Moves:</span>
      <span class="stat-value" id="movesCount">0</span>
    </div>
    <div class="stat-item">
      <span>🍥 Pairs:</span>
      <span class="stat-value" id="matchedCount">0</span>
      <span>/24</span>
    </div>
    <div class="stat-item" id="bestScoreContainer" style="display: none;">
      <span>🏆 Best:</span>
      <span class="stat-value" id="bestScore">-</span>
      <span class="best-score">moves</span>
    </div>
    <button class="reset-btn" id="resetButton">
      <span>⟳</span> NEW GAME
    </button>
  </div>

  <div class="game-board" id="gameBoard"></div>

  <div class="win-message" id="winMessage">
    <span>🐉✨ SHENRON APPEARS! ✨🐉</span>
  </div>
</div>

<script>
  (function() {
    // ---------- AUDIO SYSTEM ----------
    let audioContext = null;
    let soundEnabled = true;
    
    function initAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Resume if suspended (browsers require user interaction)
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }

    // Card flip sound - quick swoosh effect
    function playFlipSound() {
      if (!soundEnabled) return;
      initAudioContext();
      
      const now = audioContext.currentTime;
      
      // Create a short "whoosh" sound
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      const filter = audioContext.createBiquadFilter();
      
      oscillator.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(400, now);
      oscillator.frequency.exponentialRampToValueAtTime(800, now + 0.08);
      
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(600, now);
      filter.Q.value = 1;
      
      gainNode.gain.setValueAtTime(0.15, now);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      
      oscillator.start(now);
      oscillator.stop(now + 0.1);
    }

    // Match found sound - power-up effect
    function playMatchSound() {
      if (!soundEnabled) return;
      initAudioContext();
      
      const now = audioContext.currentTime;
      
      // Create a rising power-up sound
      const osc1 = audioContext.createOscillator();
      const osc2 = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      osc1.connect(gainNode);
      osc2.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      // First oscillator - main tone
      osc1.type = 'triangle';
      osc1.frequency.setValueAtTime(500, now);
      osc1.frequency.linearRampToValueAtTime(1000, now + 0.3);
      
      // Second oscillator - harmony
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(750, now);
      osc2.frequency.linearRampToValueAtTime(1500, now + 0.3);
      
      gainNode.gain.setValueAtTime(0.2, now);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.4);
      osc2.stop(now + 0.4);
    }

    // Win sound - victory fanfare
    function playWinSound() {
      if (!soundEnabled) return;
      initAudioContext();
      
      const now = audioContext.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
      
      notes.forEach((freq, i) => {
        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        osc.type = 'triangle';
        osc.frequency.value = freq;
        
        const startTime = now + i * 0.15;
        gainNode.gain.setValueAtTime(0.2, startTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);
        
        osc.start(startTime);
        osc.stop(startTime + 0.3);
      });
    }

    // Toggle sound button
    const soundToggle = document.getElementById('soundToggle');
    soundToggle.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) {
        soundToggle.textContent = '🔊';
        soundToggle.classList.remove('muted');
        // Play a quick test sound
        initAudioContext();
        setTimeout(() => playFlipSound(), 100);
      } else {
        soundToggle.textContent = '🔇';
        soundToggle.classList.add('muted');
      }
    });

    // ---------- API CONFIGURATION ----------
    const API_BASE_URL = 'https://dragonball-api.com/api/characters';
    const FALLBACK_IMAGE = 'data:image/svg+xml,' + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="#FF8C00" stroke="#FFD700" stroke-width="3"/>
        <text x="50" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DB</text>
      </svg>
    `);

    let charactersData = [];
    let cardsData = [];
    let flippedCards = [];
    let matchedPairsCount = 0;
    let moveCount = 0;
    let lockBoard = false;
    let bestScore = localStorage.getItem('dbzMemoryBestScore') || null;

    const gameBoard = document.getElementById('gameBoard');
    const matchedCountSpan = document.getElementById('matchedCount');
    const movesCountSpan = document.getElementById('movesCount');
    const bestScoreSpan = document.getElementById('bestScore');
    const bestScoreContainer = document.getElementById('bestScoreContainer');
    const winMessageDiv = document.getElementById('winMessage');
    const resetBtn = document.getElementById('resetButton');
    const loadingScreen = document.getElementById('loadingScreen');
    const gameWrapper = document.getElementById('gameWrapper');
    const errorMessage = document.getElementById('errorMessage');

    // ---------- DISPLAY BEST SCORE ----------
    function updateBestScoreDisplay() {
      if (bestScore) {
        bestScoreSpan.textContent = bestScore;
        bestScoreContainer.style.display = 'flex';
      } else {
        bestScoreContainer.style.display = 'none';
      }
    }

    function updateBestScore(newScore) {
      if (!bestScore || newScore < bestScore) {
        bestScore = newScore;
        localStorage.setItem('dbzMemoryBestScore', bestScore);
        bestScoreSpan.textContent = bestScore;
        bestScoreContainer.style.display = 'flex';
      }
    }

    // ---------- FETCH CHARACTERS FROM API ----------
    async function fetchCharacters() {
      try {
        const allCharacters = [];
        
        for (let page = 1; page <= 5; page++) {
          const response = await fetch(`${API_BASE_URL}?page=${page}&limit=10`);
          if (!response.ok) {
            throw new Error(`API responded with status ${response.status}`);
          }
          const data = await response.json();
          
          if (data.items && data.items.length > 0) {
            allCharacters.push(...data.items);
          }
          
          if (allCharacters.length >= 24) {
            break;
          }
        }

        if (allCharacters.length < 24) {
          throw new Error('Not enough characters from API');
        }

        const selectedCharacters = selectBestCharacters(allCharacters.slice(0, 30));
        return selectedCharacters;

      } catch (error) {
        console.error('API fetch failed:', error);
        return getFallbackCharacters();
      }
    }

    function selectBestCharacters(characters) {
      const withImages = characters.filter(char => char.image);
      const pool = withImages.length >= 24 ? withImages : characters;
      
      const unique = [];
      const seenIds = new Set();
      
      for (const char of pool) {
        if (!seenIds.has(char.id) && unique.length < 24) {
          seenIds.add(char.id);
          unique.push({
            id: char.id.toString(),
            name: char.name,
            image: char.image || FALLBACK_IMAGE,
            icon: '🐉'
          });
        }
      }

      while (unique.length < 24) {
        const fallback = getFallbackCharacters();
        for (const fb of fallback) {
          if (unique.length >= 24) break;
          if (!unique.find(u => u.id === fb.id)) {
            unique.push(fb);
          }
        }
      }

      return unique.slice(0, 24);
    }

    function getFallbackCharacters() {
      return [
        { id: "goku", name: "Goku", image: "https://dragonball-api.com/characters/1.jpg", icon: "☯️" },
        { id: "vegeta", name: "Vegeta", image: "https://dragonball-api.com/characters/2.jpg", icon: "👑" },
        { id: "gohan", name: "Gohan", image: "https://dragonball-api.com/characters/3.jpg", icon: "🔥" },
        { id: "piccolo", name: "Piccolo", image: "https://dragonball-api.com/characters/4.jpg", icon: "🧥" },
        { id: "frieza", name: "Frieza", image: "https://dragonball-api.com/characters/5.jpg", icon: "❄️" },
        { id: "cell", name: "Cell", image: "https://dragonball-api.com/characters/6.jpg", icon: "🟢" },
        { id: "buu", name: "Majin Buu", image: "https://dragonball-api.com/characters/7.jpg", icon: "🍬" },
        { id: "trunks", name: "Trunks", image: "https://dragonball-api.com/characters/8.jpg", icon: "🗡️" },
        { id: "krillin", name: "Krillin", image: "https://dragonball-api.com/characters/9.jpg", icon: "💪" },
        { id: "roshi", name: "Master Roshi", image: "https://dragonball-api.com/characters/10.jpg", icon: "🐢" },
        { id: "tien", name: "Tien Shinhan", image: "https://dragonball-api.com/characters/11.jpg", icon: "👁️" },
        { id: "yamcha", name: "Yamcha", image: "https://dragonball-api.com/characters/12.jpg", icon: "🐺" },
        { id: "chichi", name: "Chi-Chi", image: "https://dragonball-api.com/characters/13.jpg", icon: "👩" },
        { id: "bulma", name: "Bulma", image: "https://dragonball-api.com/characters/14.jpg", icon: "👩‍🔬" },
        { id: "videl", name: "Videl", image: "https://dragonball-api.com/characters/15.jpg", icon: "🥊" },
        { id: "goten", name: "Goten", image: "https://dragonball-api.com/characters/16.jpg", icon: "👦" },
        { id: "android17", name: "Android 17", image: "https://dragonball-api.com/characters/17.jpg", icon: "🤖" },
        { id: "android18", name: "Android 18", image: "https://dragonball-api.com/characters/18.jpg", icon: "👩‍🦳" },
        { id: "beerus", name: "Beerus", image: "https://dragonball-api.com/characters/19.jpg", icon: "🐱" },
        { id: "whis", name: "Whis", image: "https://dragonball-api.com/characters/20.jpg", icon: "👼" },
        { id: "jiren", name: "Jiren", image: "https://dragonball-api.com/characters/21.jpg", icon: "👽" },
        { id: "hit", name: "Hit", image: "https://dragonball-api.com/characters/22.jpg", icon: "⏱️" },
        { id: "zamasu", name: "Zamasu", image: "https://dragonball-api.com/characters/23.jpg", icon: "😈" },
        { id: "shenron", name: "Shenron", image: "https://dragonball-api.com/characters/24.jpg", icon: "🐉" }
      ];
    }

    // ---------- GAME LOGIC ----------
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function buildDeck() {
      const deck = [];
      charactersData.forEach(char => {
        deck.push(char.id);
        deck.push(char.id);
      });
      return shuffleArray(deck);
    }

    function getCharacterById(id) {
      return charactersData.find(char => char.id === id);
    }

    function updateMoveDisplay() {
      movesCountSpan.textContent = moveCount;
    }

    function renderBoard() {
      gameBoard.innerHTML = '';
      cardsData.forEach((charId, index) => {
        const character = getCharacterById(charId);
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = index;
        card.dataset.characterId = charId;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">
              <img src="${character.image}" 
                   alt="${character.name}" 
                   class="character-image"
                   onerror="this.src='${FALLBACK_IMAGE}'"
                   loading="lazy">
              <span class="character-name-tag">${character.name}</span>
            </div>
            <div class="card-back"></div>
          </div>
        `;

        card.addEventListener('click', () => handleCardClick(card));
        gameBoard.appendChild(card);
      });
    }

    function resetGame() {
      flippedCards = [];
      lockBoard = false;
      matchedPairsCount = 0;
      moveCount = 0;
      matchedCountSpan.textContent = '0';
      updateMoveDisplay();
      winMessageDiv.classList.remove('visible');
      cardsData = buildDeck();
      renderBoard();
      updateBestScoreDisplay();
    }

    function checkMatch() {
      const [card1, card2] = flippedCards;
      const id1 = card1.dataset.characterId;
      const id2 = card2.dataset.characterId;

      moveCount++;
      updateMoveDisplay();

      if (id1 === id2) {
        // MATCH FOUND - play match sound
        playMatchSound();
        
        card1.classList.remove('flipped');
        card2.classList.remove('flipped');
        card1.classList.add('matched');
        card2.classList.add('matched');
        
        matchedPairsCount++;
        matchedCountSpan.textContent = matchedPairsCount;
        flippedCards = [];
        lockBoard = false;

        if (matchedPairsCount === charactersData.length) {
          setTimeout(() => {
            winMessageDiv.classList.add('visible');
            playWinSound(); // Play victory fanfare
          }, 300);
          updateBestScore(moveCount);
        }
      } else {
        lockBoard = true;
        setTimeout(() => {
          if (!card1.classList.contains('matched')) {
            card1.classList.remove('flipped');
          }
          if (!card2.classList.contains('matched')) {
            card2.classList.remove('flipped');
          }
          flippedCards = [];
          lockBoard = false;
        }, 750);
      }
    }

    function handleCardClick(card) {
      if (lockBoard) return;
      if (card.classList.contains('matched')) return;
      if (card.classList.contains('flipped')) return;
      if (flippedCards.includes(card)) return;

      // Play flip sound when card is clicked
      playFlipSound();
      
      card.classList.add('flipped');
      flippedCards.push(card);

      if (flippedCards.length === 2) {
        checkMatch();
      }
    }

    // ---------- INITIALIZATION ----------
    async function initGame() {
      try {
        loadingScreen.style.display = 'flex';
        gameWrapper.classList.remove('ready');
        errorMessage.style.display = 'none';

        charactersData = await fetchCharacters();
        
        if (charactersData.length < 24) {
          throw new Error('Could not load enough characters');
        }

        cardsData = buildDeck();
        renderBoard();
        matchedPairsCount = 0;
        moveCount = 0;
        matchedCountSpan.textContent = '0';
        updateMoveDisplay();
        flippedCards = [];
        lockBoard = false;
        winMessageDiv.classList.remove('visible');
        updateBestScoreDisplay();

        loadingScreen.style.display = 'none';
        gameWrapper.classList.add('ready');

        // Initialize audio context on first user interaction
        document.addEventListener('click', initAudioContext, { once: true });

      } catch (error) {
        console.error('Game initialization error:', error);
        errorMessage.style.display = 'block';
        errorMessage.textContent = '⚠️ Using offline characters - API unavailable';
        
        charactersData = getFallbackCharacters();
        cardsData = buildDeck();
        renderBoard();
        matchedPairsCount = 0;
        moveCount = 0;
        updateMoveDisplay();
        updateBestScoreDisplay();
        
        loadingScreen.style.display = 'none';
        gameWrapper.classList.add('ready');
        
        document.addEventListener('click', initAudioContext, { once: true });
      }
    }

    resetBtn.addEventListener('click', resetGame);
    window.addEventListener('resize', () => {});

    // Start the game
    initGame();
  })();
</script>
</body>
</html>
