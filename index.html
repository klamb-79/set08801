<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Dragon Ball Memory Rush - Home</title>
  <link rel="stylesheet" href="home-styles.css">
</head>
<body>
  <div class="home-container">
    <!-- Animated background particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Dragon Balls decoration -->
    <div class="dragon-balls-decoration">
      <div class="dragon-ball db-1"></div>
      <div class="dragon-ball db-2"></div>
      <div class="dragon-ball db-3"></div>
      <div class="dragon-ball db-4"></div>
      <div class="dragon-ball db-5"></div>
      <div class="dragon-ball db-6"></div>
      <div class="dragon-ball db-7"></div>
    </div>

    <!-- Main content -->
    <div class="main-content">
      <div class="title-section">
        <h1 class="game-title">
          <span class="title-dragon">DRAGON BALL</span>
          <span class="title-memory">MEMORY RUSH</span>
        </h1>
        <div class="title-underline"></div>
        <p class="subtitle-text">Find all 24 pairs to summon Shenron!</p>
      </div>

      <div class="game-preview">
        <div class="preview-cards">
          <div class="preview-card">
            <div class="preview-card-inner">
              <span>☯️</span>
            </div>
          </div>
          <div class="preview-card">
            <div class="preview-card-inner">
              <span>👑</span>
            </div>
          </div>
          <div class="preview-card">
            <div class="preview-card-inner">
              <span>🔥</span>
            </div>
          </div>
          <div class="preview-card">
            <div class="preview-card-inner">
              <span>🐉</span>
            </div>
          </div>
        </div>
      </div>

      <div class="features-section">
        <div class="feature-item">
          <span class="feature-icon">🎮</span>
          <span>24 Character Pairs</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🔊</span>
          <span>Sound Effects</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🏆</span>
          <span>Best Score Tracking</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">⚡</span>
          <span>DBZ Characters</span>
        </div>
      </div>

      <button class="play-button" id="playButton" onclick="startGame()">
        <span class="button-text">START GAME</span>
        <span class="button-icon">⚡</span>
        <span class="button-glow"></span>
      </button>

      <div class="instructions">
        <h3>How to Play</h3>
        <p>Click cards to flip them and find matching pairs of Dragon Ball Z characters. Match all 24 pairs to win!</p>
      </div>

      <div class="best-score-display" id="homeBestScore">
        <!-- Will be populated by JavaScript -->
      </div>
    </div>

    <!-- Shenron silhouette -->
    <div class="shenron-silhouette">
      <span>🐉</span>
    </div>
  </div>
